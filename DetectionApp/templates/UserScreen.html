{% extends 'base.html' %}

{% block title %}Results - AlzheimerCare AI{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
        <h2 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Analysis Results
        </h2>
        
        <div class="prose max-w-none text-slate-700 overflow-x-auto">
            {{ data|safe }}
        </div>
    </div>

    {% if img %}
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
        <h3 class="text-xl font-bold text-slate-900 mb-6">Performance Visualization</h3>
        <div class="flex justify-center bg-slate-50 rounded-2xl p-6 border border-slate-100">
            <img src="data:image/png;base64, {{ img }}" alt="Algorithm Performance Graph" class="max-w-full h-auto rounded-lg shadow-sm">
        </div>
    </div>
    {% endif %}
</div>

<style>
    /* Modern Table Styling */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 1.5rem 0;
        border-radius: 1rem;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        background: white;
    }
    th {
        background-color: #f8fafc;
        color: #475569;
        font-weight: 600;
        text-align: left;
        padding: 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-bottom: 2px solid #e2e8f0;
    }
    td {
        padding: 1rem;
        color: #334155;
        border-bottom: 1px solid #f1f5f9;
        font-size: 0.875rem;
    }
    tr:last-child td {
        border-bottom: none;
    }
    tr:hover td {
        background-color: #f8fafc;
    }

    /* Status Messages */
    .status-msg {
        padding: 1rem 1.5rem;
        border-radius: 0.75rem;
        margin-bottom: 0.75rem;
        font-weight: 500;
        border-left: 4px solid transparent;
    }
    .status-msg.info {
        background-color: #eff6ff;
        color: #1e40af;
        border-left-color: #3b82f6;
    }

    /* Badges */
    .badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
    }
    .badge.success {
        background-color: #dcfce7;
        color: #166534;
    }
    .badge.danger {
        background-color: #fee2e2;
        color: #991b1b;
    }
</style>
{% endblock %}
