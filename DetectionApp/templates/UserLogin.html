{% extends 'base.html' %}

{% block title %}User Login - AlzheimerCare AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-blue-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
            <p class="text-blue-100 text-sm mt-1">Please sign in to your account</p>
        </div>
        
        <form method="post" action="{% url 'UserLoginAction' %}" class="p-8 space-y-6">
            {% csrf_token %}
            
            {% if data %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                    <p class="text-red-700 text-sm font-medium">{{ data }}</p>
                </div>
            {% endif %}

            <div>
                <label for="t1" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" name="t1" id="t1" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="t2" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" name="t2" id="t2" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 focus:ring-4 focus:ring-blue-100">
                Sign In
            </button>
            
            <p class="text-center text-sm text-slate-500 mt-6">
                Don't have an account? 
                <a href="{% url 'Register' %}" class="text-blue-600 font-semibold hover:underline">Create one</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
