{% extends 'base.html' %}

{% block title %}Sign Up - AlzheimerCare AI{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-blue-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white">Create Account</h2>
            <p class="text-blue-100 text-sm mt-1">Join the network for advanced diagnostic analysis</p>
        </div>
        
        <form method="post" action="{% url 'RegisterAction' %}" class="p-8 space-y-5">
            {% csrf_token %}
            
            {% if data %}
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
                    <p class="text-blue-700 text-sm font-medium">{{ data }}</p>
                </div>
            {% endif %}

            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label for="t1" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                    <input type="text" name="t1" id="t1" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label for="t2" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input type="password" name="t2" id="t2" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label for="t3" class="block text-sm font-semibold text-slate-700 mb-2">Contact Number</label>
                    <input type="text" name="t3" id="t3" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label for="t4" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" name="t4" id="t4" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label for="t5" class="block text-sm font-semibold text-slate-700 mb-2">Clinic/Address</label>
                <textarea name="t5" id="t5" rows="2" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 mt-4">
                Register Account
            </button>
            
            <p class="text-center text-sm text-slate-500 mt-4">
                Already registered? 
                <a href="{% url 'UserLogin' %}" class="text-blue-600 font-semibold hover:underline">Sign In</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
