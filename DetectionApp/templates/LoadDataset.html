{% extends 'base.html' %}

{% block title %}Load Dataset - AlzheimerCare AI{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-blue-600 px-8 py-8 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-white text-center">Load Alzheimer Disease Dataset</h2>
                <p class="text-blue-100 text-sm mt-1">Upload a CSV file containing clinical and cognitive patient data</p>
            </div>
            <div class="bg-blue-500 p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
        </div>
        
        <form method="post" action="{% url 'LoadDatasetAction' %}" enctype="multipart/form-data" class="p-8">
            {% csrf_token %}
            
            <div class="border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center hover:border-blue-400 transition-colors bg-slate-50">
                <input type="file" name="t1" id="t1" required class="hidden">
                <label for="t1" class="cursor-pointer">
                    <div class="text-slate-600 font-medium mb-2">Click to browse or drag and drop</div>
                    <p class="text-slate-400 text-sm">Supported format: .csv</p>
                </label>
                <div id="file-name" class="mt-4 text-blue-600 font-bold text-sm hidden"></div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 mt-8 flex items-center justify-center gap-2">
                Analyze Dataset
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('t1').addEventListener('change', function(e) {
        const fileName = e.target.files[0]?.name;
        if (fileName) {
            const display = document.getElementById('file-name');
            display.textContent = 'Selected: ' + fileName;
            display.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
